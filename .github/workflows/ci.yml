---
name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      release:
        description: Create a release (tag, publish to Hex, GitHub release)
        type: boolean
        default: false

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-lint-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-lint-

      - run: mise run --output=keep-order verify

  test:
    name: Test

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history: tests in rebar3_uncovered_git_tests exercise real git
          # against this repo (e.g. HEAD~1), which needs more than a shallow clone.
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-test-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-test-

      - run: mise run --output=keep-order test

  release:
    name: Release

    runs-on: ubuntu-24.04

    needs: [lint, test]

    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    environment: hex

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: >-
            rebar3-${{runner.os}}_${{runner.arch}}-release-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-release-

      - name: Calculate next version
        id: version
        run: |
          VERSION=$(git-cliff --bumped-version)
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$CURRENT" ] && [ "$VERSION" = "$CURRENT" ]; then
            {
              echo "## No releasable changes since \`${CURRENT}\`"
              echo ""
              echo "All commits since \`${CURRENT}\` are skipped by" \
                "\`cliff.toml\` (ci/build/docs/chore/test/style)."
              echo "Add a \`feat\`, \`fix\`, \`refactor\`, or \`perf\`" \
                "commit before releasing."
              echo ""
              echo "### Commits since \`${CURRENT}\`"
              echo ""
              git log --format='- %s' "${CURRENT}..HEAD"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::No releasable commits since ${CURRENT} \
          (only ci/build/docs/chore/test/style). Nothing to bump."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "changelog<<CHANGELOG_EOF"
            git-cliff --unreleased --strip all --output - | tail -n +3
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Tag and push
        if: ${{ inputs.release }}
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Publish to Hex
        if: ${{ inputs.release }}
        run: rebar3 hex publish package --yes --repo hexpm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Create GitHub release
        if: ${{ inputs.release }}
        env:
          GH_TOKEN: ${{ github.token }}
          # Via env var so backticks in the changelog aren't evaluated as
          # shell command substitution.
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: >-
          gh release create ${{ steps.version.outputs.version }}
          --title ${{ steps.version.outputs.version }}
          --notes "$CHANGELOG"

      - name: Summary
        env:
          # Via env var so backticks in the changelog aren't evaluated as
          # shell command substitution.
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG=rebar3_uncovered
          {
            if [ "${{ inputs.release }}" = "true" ]; then
              echo "## Released ${VERSION}"
              echo ""
              echo "- [GitHub Release](https://github.com/eproxus/${PKG}/releases/tag/${VERSION})"
              echo "- [Hex Package](https://hex.pm/packages/${PKG}/${VERSION#v})"
            else
              echo "## Release Dry-Run"
            fi
            echo ""
            echo "Version: \`${VERSION}\`"
            echo ""
            echo "## Changelog"
            echo ""
            echo "$CHANGELOG"
          } >> "$GITHUB_STEP_SUMMARY"
