---
name: CI

on:
  - push

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@v3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-rebar-${{hashFiles('rebar.lock')}}

      - run: mise run --output=keep-order verify

  test:
    name: Test

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@v3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-rebar-${{hashFiles('rebar.lock')}}

      - run: mise run --output=keep-order test
