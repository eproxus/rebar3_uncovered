---
name: CI

on:
  - push

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@v3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-lint-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-lint-

      - run: mise run --output=keep-order verify

  test:
    name: Test

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@v3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: rebar3-${{runner.os}}_${{runner.arch}}-test-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-test-

      - run: mise run --output=keep-order test

  release:
    name: Release

    runs-on: ubuntu-24.04

    needs: [lint, test]

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    environment: hex

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rebar3
            _build
            !_build/test/logs
          key: >-
            rebar3-${{runner.os}}_${{runner.arch}}-release-${{hashFiles('mise.toml', 'rebar.lock')}}
          restore-keys: |
            rebar3-${{runner.os}}_${{runner.arch}}-release-

      - run: rebar3 hex publish package --yes --repo hexpm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - run: >-
          gh release create ${{github.ref_name}}
          --title ${{github.ref_name}}
          --notes "$(git-cliff --latest --strip all --output - | tail -n +3)"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
